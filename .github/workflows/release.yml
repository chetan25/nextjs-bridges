name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          # Deliberately no registry-url here: that option makes setup-node
          # write a project-level .npmrc pointing auth at ${NODE_AUTH_TOKEN},
          # and @semantic-release/npm's own docs say an existing .npmrc
          # overrides any env var it's given — so a NODE_AUTH_TOKEN-less
          # NPM_TOKEN env would silently authenticate as empty (401). Without
          # this option, no .npmrc is created and @semantic-release/npm reads
          # NPM_TOKEN directly, defaulting to the public registry on its own.

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm --filter "./packages/*" build

      # Each package releases independently — semantic-release-monorepo scopes
      # commit analysis (and the git tag it creates, e.g. @chetand/share@1.2.0)
      # to commits that touched that package's own directory, so a change to
      # only one package doesn't bump the others.
      - name: Release @chetand/lazy-handler
        working-directory: packages/lazy-handler
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Release @chetand/hydration
        working-directory: packages/hydration
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Release @chetand/share
        working-directory: packages/share
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
